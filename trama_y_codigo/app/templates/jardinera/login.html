{% extends "base.html" %}
{% block titulo %}Login — La Jardinera{% endblock %}
{% block contenido %}
<section class="seccion" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="contenedor-estrecho">
        <div class="panel-cristal" style="max-width: 450px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2>🌿 La Jardinera</h2>
                <p class="texto-manuscrito">Solo la guardiana puede entrar aquí</p>
            </div>
            <form method="POST" action="{{ url_for('jardinera.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-grupo">
                    <label for="email">Correo</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-grupo">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" class="form-control" required>
                </div>
                <button type="submit" class="boton boton-primario" style="width: 100%; justify-content: center;">Entrar al jardín</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
